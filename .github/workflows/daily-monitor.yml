name: Daily Research Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install last30days-skill
        run: |
          git clone https://github.com/mvanhorn/last30days-skill.git /tmp/last30days
          cd /tmp/last30days
          pip install -r requirements.txt
      
      - name: Research — Citation Verification
        run: |
          cd /tmp/last30days
          python3 scripts/last30days.py --sources=hackernews "citation verification" > /tmp/r1.txt 2>&1 || true
          echo "### 🔍 Citation Verification" > /tmp/brief.md
          head -80 /tmp/r1.txt >> /tmp/brief.md
          echo "" >> /tmp/brief.md && echo "---" >> /tmp/brief.md && echo "" >> /tmp/brief.md
      
      - name: Research — Hallucinated Citation
        run: |
          cd /tmp/last30days
          python3 scripts/last30days.py --sources=hackernews "hallucinated citation" > /tmp/r2.txt 2>&1 || true
          echo "### 🤖 Hallucinated Citation" >> /tmp/brief.md
          head -80 /tmp/r2.txt >> /tmp/brief.md
          echo "" >> /tmp/brief.md && echo "---" >> /tmp/brief.md && echo "" >> /tmp/brief.md
      
      - name: Research — RefChecker
        run: |
          cd /tmp/last30days
          python3 scripts/last30days.py --sources=hackernews "RefChecker" > /tmp/r3.txt 2>&1 || true
          echo "### 🛠️ RefChecker" >> /tmp/brief.md
          head -80 /tmp/r3.txt >> /tmp/brief.md
          echo "" >> /tmp/brief.md && echo "---" >> /tmp/brief.md && echo "" >> /tmp/brief.md
      
      - name: Research — SourceVerify
        run: |
          cd /tmp/last30days
          python3 scripts/last30days.py --sources=hackernews "SourceVerify" > /tmp/r4.txt 2>&1 || true
          echo "### 🔎 SourceVerify" >> /tmp/brief.md
          head -80 /tmp/r4.txt >> /tmp/brief.md
      
      - name: Send to Feishu
        run: |
          CONTENT=$(head -c 3500 /tmp/brief.md | sed 's/"/\\"/g' | tr '\n' ' ')
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"📊 LitSource Daily Brief — $(date +%Y-%m-%d)\n\n$CONTENT\"}}" \
            || echo "Feishu failed"
